<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pago BlackCat</title>
  <style>
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#08080b;
      color:white;
      font-family:Arial, sans-serif;
      padding:20px;
      box-sizing:border-box;
    }

    .card{
      width:100%;
      max-width:460px;
      background:#111;
      border:1px solid rgba(255,255,255,.12);
      border-radius:18px;
      padding:24px;
      text-align:center;
      box-shadow:0 20px 60px rgba(0,0,0,.45);
    }

    h1{
      margin:0 0 12px;
      font-size:26px;
    }

    p{
      color:rgba(255,255,255,.78);
      line-height:1.45;
    }

    .ok{
      font-size:42px;
      margin-bottom:10px;
    }

    a{
      display:block;
      margin-top:14px;
      padding:13px 16px;
      border-radius:12px;
      text-decoration:none;
      font-weight:800;
    }

    .home{
      background:white;
      color:#111;
    }

    .wa{
      background:#25D366;
      color:white;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="ok">✅</div>
    <h1>Gracias por tu compra</h1>
    <p>
      Si el pago fue aprobado, BlackCat recibirá la confirmación y validará tu pedido.
      También puedes escribirnos por WhatsApp para confirmar disponibilidad y entrega.
    </p>

    <a class="home" href="/">Volver a BlackCat</a>
    <a class="wa" href="https://wa.me/50361900185" target="_blank" rel="noopener noreferrer">
      Confirmar por WhatsApp
    </a>
  </div>
</body>
</html>
